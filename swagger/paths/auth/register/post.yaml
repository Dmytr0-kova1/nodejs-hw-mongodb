tags:
  - Auth
summary: Register user
operationId: registerUser
description: 'Register a new user by providing their name, email, and password.'
security: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - name
          - email
          - password
        properties:
          name:
            type: string
            description: "User's full name"
            example: 'Kateryna Povalenko'
          email:
            type: string
            description: "User's email address"
            example: 'kateryna.pov5@example.com'
          password:
            type: string
            description: "User's password"
            example: '123456'
responses:
  '201':
    description: User successfully registered
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: 'Successfully registered a user!'
            data:
              type: object
              properties:
                name:
                  type: string
                  example: 'Kateryna Povalenko'
                email:
                  type: string
                  example: 'kateryna.pov5@example.com'
  '401':
    $ref: '../../../components/responses/401.yaml'
  '404':
    $ref: '../../../components/responses/404.yaml'
