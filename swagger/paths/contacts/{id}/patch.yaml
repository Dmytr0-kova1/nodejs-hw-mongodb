tags:
  - Contacts
summary: Update contact by id
operationId: patchContact
description: 'Update contact by id'
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
      example: '67f24579c88bd1471149b7ca'
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            description: "Contact's name"
            type: string
            example: 'Kateryna Povalenko'
          phoneNumber:
            description: "Contact's phone number"
            type: string
            example: '+380000000005'
          email:
            description: "Contact's email"
            type: string
            example: 'kateryna.pov5@example.com'
          isFavourite:
            description: 'Whether is contact on favourites'
            type: boolean
            example: false
          contactType:
            description: "Contact's type"
            type: string
            enum: ['work', 'home', 'personal']
            example: 'personal'
responses:
  '200':
    description: 'Contact correction'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Successfully patched a contact!'
            data:
              type: object
              $ref: '../../../components/schemas/contact.yaml'
  '404':
    $ref: '../../../components/responses/404.yaml'
